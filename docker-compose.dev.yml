services:
  backend:
    build:
      context: .
      target: builder
    command: pnpm --filter @h-orchestra/backend dev
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - "${REPO_PATH:-.}:/mounted-repo"
    environment:
      NODE_ENV: development
      MOUNT_PATH: /mounted-repo
      CHOKIDAR_USEPOLLING: "false"
      PORT: "3001"

  frontend:
    build:
      context: .
      target: builder
    command: pnpm --filter @h-orchestra/frontend dev --host
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      VITE_API_BASE: "http://localhost:3001"
    depends_on:
      - backend
