services:
  h-orchestra:
    build:
      context: .
      target: production
    image: h-orchestra:latest
    ports:
      - "3001:3001"
    volumes:
      - "${REPO_PATH:-.}:/mounted-repo"
    environment:
      MOUNT_PATH: /mounted-repo
      CHOKIDAR_USEPOLLING: "true"
      # Linux host: pass your UID/GID to avoid file permission issues
      # HOST_UID: "${HOST_UID:-}"
      # HOST_GID: "${HOST_GID:-}"
      # Tracing — leave empty to disable
      LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY:-}"
      LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY:-}"
      LANGFUSE_BASE_URL: "${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}"
      HELICONE_API_KEY: "${HELICONE_API_KEY:-}"
    restart: unless-stopped
