name: Docker

on:
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'docker-compose.yml'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docker.yml'
  push:
    branches: [main]

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-smoke:
    name: build + /health smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: h-orchestra:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container
        run: |
          docker run -d --name h-orchestra-smoke \
            -p 3001:3001 \
            -e MOUNT_PATH=/tmp \
            -v "${{ github.workspace }}":/mounted-repo:ro \
            h-orchestra:ci

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3001/health >/dev/null; then
              echo "healthy"
              exit 0
            fi
            sleep 1
          done
          echo "service did not become healthy"
          docker logs h-orchestra-smoke
          exit 1

      - name: Curl /health
        run: curl -fsS http://localhost:3001/health | tee health.json

      - name: Cleanup
        if: always()
        run: docker rm -f h-orchestra-smoke || true
